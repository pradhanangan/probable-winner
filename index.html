<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f7f7ff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            color: #4a4aff;
            font-size: 2.2rem;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.6;
        }
    </style>
  </head>
  <body>
   <div class="card">
        <h1>Hello</h1>
        <p>
            I wish you a wonderful day and a happy, peaceful life where all your dreams come true.
            You are amazing and beautiful! I believe in you!
        </p>
    </div>
  </body>
</html>
