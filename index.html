<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A little message for you</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f7f7ff;
      color: #333;

      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .content {
      max-width: 700px;
      font-size: 1.15rem;
      line-height: 1.6;
    }

    h1 {
      margin-top: 0;
      color: #4a4aff;
      font-size: 1.8rem;
    }

    h2 {
      margin: 26px 0 10px;
      color: #333;
      font-size: 1.35rem;
      font-weight: 700;
    }

    p {
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>A little message for you</h1>

    <p>I wish you a wonderful day</p>
    <p>and a happy, peaceful life</p>
    <p>where all your dreams come true.</p>

    <br />

    <p>You are amazing and beautiful!</p>
    <p>I believe in you!</p>

    <h2>A thought</h2>
    <p>I want to be a part but not stand out.</p>
  </div>
</body>
</html>
