<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A little message for you</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f7f7ff;
      color: #333;

      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      max-width: 700px;
      font-size: 1.15rem;
      line-height: 1.6;
      text-align: left;
    }

    h1 {
      margin-top: 0;
      color: #4a4aff;
      font-size: 1.8rem;
    }

    h2 {
      margin: 26px 0 10px;
      color: #333;
      font-size: 1.35rem;
      font-weight: 700;
    }

    ul {
      margin: 12px 0;
      padding-left: 1.2em;
    }

    li {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>A little message for you</h1>

    <ul>
      <li>I wish you a wonderful day</li>
      <li>and a happy, peaceful life</li>
      <li>where all your dreams come true.</li>
    </ul>

    <ul>
      <li>You are amazing and beautiful!</li>
      <li>I believe in you!</li>
    </ul>

    <h2>Quiet</h2>
    <ul>
      <li>I want to be a part but not stand out.</li>
    </ul>
  </div>
</body>
</html>
